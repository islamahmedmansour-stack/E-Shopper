<!DOCTYPE html>
<html>

<head>
    <title>
        E-Shopper
    </title>
    <link rel="stylesheet" href="style.css">
    <link href="bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
    <link rel="icon" href="logo.png">
    <meta charset="UTF-8">
    <meta name="description" content="shopping">
    <meta name="keywords" content="shop,labtops,Furniture">
    <meta name="author" content="Islam Mansour">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <!-- =========================== ( بسم الله ) ===========================  -->
    <!-- =====================================================================  -->
    <!-- ===( START )===( . . . MAIN . . . )==================================  -->
    <header>
        <div class="container w-100 h-100 d-flex justify-content-between align-items-center">
            <h1>E-Shopper</h1>
            <nav>
                <a id="homeButton" href="#">Home</a>
                <a id="favoriteButton" href="#">Favorites</a>
                <span id="favoritesCount">0</span>
            </nav>
        </div>
    </header>
    <!-- =====================================================================  -->
     <div id="homePage">    <!-- Start Home Page -->
         <section class="main container py-3">
        <h2 class="text-center py-3">Product Categories</h2>
        <div id="categoriesShow" class="row g-3 pt-4">
            <!-- fill from js -->
        </div>
    </section>
    <!-- ==================================( . . . MAIN . . . )===(  END  )===  -->
    <!-- =====================================================================  -->
    <!-- ===( START )===(       items     )===================================  -->
    <section id="itemsShow" class="container py-3">
        <!-- fill from js -->
    </section>
    <!-- ===================================(     items       )===(  END  )===  -->
     </div> <!-- End Home Page -->
    <!-- =====================================================================  -->
    <!-- ===( START )===(   full screen   )===================================  -->
    <div id="itemFullDetails">
        <!-- fill from js -->
    </div>
    <!-- ===================================(    full screen  )===(  END  )===  -->
    <!-- =====================================================================  -->
    <!-- ===( START )===( favorite page   )===================================  -->
    <div id="favoritePage" class="container py-3 display_none">
        <!-- fill from js -->
    </div>
    <!-- ===================================(  favorite page  )===(  END  )===  -->
    <!-- =====================================================================  -->
    <!-- ===( START )===( . . FOOTER  . . )===================================  -->
    <footer>
        <p>&#169; 2025 E-Shopper | All rights reserved.</p>
    </footer>
    <!-- ===================================( . . FOOTER  . . )===(  END  )===  -->
    <!-- =====================================================================  -->
    <!-- =========================== ( الحمد لله) ===========================  -->
    <script src="jquery-4.0.0.min.js"></script>
    <script src="bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
